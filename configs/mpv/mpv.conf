# Оптимизация шейдеров (Твой текущий режим Anime4K)
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

# --- Профиль максимального качества (HQ) ---
profile=gpu-hq
vo=gpu-next                # Использование современного видеовывода (лучше работает с шейдерами и Vulkan)
gpu-api=vulkan             # Vulkan обычно производительнее на Linux/Windows с NVIDIA, чем OpenGL/DirectX

# --- Аппаратное декодирование ---
hwdec=nvdec                # Прямое аппаратное декодирование для NVIDIA (или просто hwdec=auto-safe)

# --- Настройки масштабирования и рендеринга (если шейдеры не сработали) ---
scale=ewa_lanczos          # Высококачественное масштабирование
dscale=mitchell            # Отличное даунскейлинг-качество
cscale=spline36            # Хороший баланс для хроматического апскейла

# --- Устранение бандинга (цветовых артефактов/градиентов) ---
# Очень важно для аниме, убирает «ступенчатые» переходы цвета
deband=yes
deband-iterations=4        # Точность работы фильтра
deband-threshold=48        # Чувствительность
deband-range=16            # Радиус
deband-grain=48            # Добавление минимального шума для маскировки артефактов

# --- Плавность движения (Interpolation / Уплавнялка) ---
# Настраивает отображение видео под частоту твоего монитора, убирая микрофризы (judder)
video-sync=audio
interpolation=yes
tscale=oversample          # Самый чистый метод без эффекта "мыльной оперы"

# --- Производительность и кэш ---
vd-lavc-dr=yes             # Прямой рендеринг (экономит ресурсы CPU/GPU)
fbo-format=rgba16f         # 16-битный плавающий формат для точной обработки шейдеров
scale-antiring=0.6         # Снижение артефактов "звона" вокруг линий
cscale-antiring=0.6
cache=yes
demuxer-max-bytes=800MiB       # Выделяем ОЗУ под буфер видео
demuxer-max-back-bytes=200MiB  # Храним немного уже просмотренного в памяти

# --- Прочее ---
keep-open=yes              # Не закрывать плеер после окончания видео

# Искать субтитры везде, где совпадает имя серии
sub-auto=fuzzy
sub-file-paths=sub:subs:subtitles:Sub:Subs:Subtitles

# Автоматический полноэкранный режим при запуске (помогает Wayland правильно отдавать кадры)
fs=yes

gpu-shader-cache-dir=~/.config/mpv/shaders_cache
